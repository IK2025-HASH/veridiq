<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Setup — Verid-iq</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{navy:'#0D1B3E',teal:'#00B5AD'}}}}</script>
</head>
<body class="bg-[#0D1B3E] text-slate-200 min-h-screen flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-lg">

    <div class="text-center mb-8">
      <div class="text-4xl mb-3">⚙️</div>
      <h1 class="text-3xl font-bold">
        <span class="text-white">Verid</span><span class="text-[#00B5AD]">-iq</span>
      </h1>
      <p class="text-slate-400 text-sm mt-2">First-time setup · takes about 30 seconds</p>
    </div>

    {% if error %}
    <div class="bg-red-900/30 border border-red-500/30 rounded-lg p-3 text-sm text-red-300 mb-5">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/setup" class="bg-slate-800/60 border border-slate-700/50 rounded-xl divide-y divide-slate-700/50">

      <!-- Admin account -->
      <div class="p-6 space-y-4">
        <h2 class="text-xs font-semibold text-[#00B5AD] uppercase tracking-widest">1 · Admin Account</h2>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5">Email</label>
          <input name="admin_email" type="email" required placeholder="admin@yourcompany.com" autocomplete="email"
            class="w-full bg-slate-900/60 border border-slate-600/50 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-[#00B5AD]/60 transition"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5">Password <span class="text-slate-600">(min 8 characters)</span></label>
          <input name="admin_password" type="password" required placeholder="••••••••" minlength="8"
            class="w-full bg-slate-900/60 border border-slate-600/50 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-[#00B5AD]/60 transition"/>
        </div>
      </div>

      <!-- AI config -->
      <div class="p-6 space-y-4">
        <h2 class="text-xs font-semibold text-[#00B5AD] uppercase tracking-widest">2 · AI Configuration</h2>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5">Anthropic API Key</label>
          <input name="anthropic_api_key" type="password" required placeholder="sk-ant-api03-..."
            class="w-full bg-slate-900/60 border border-slate-600/50 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-[#00B5AD]/60 transition font-mono"/>
          <p class="text-xs text-slate-600 mt-1.5">Get your key at <span class="text-slate-500">console.anthropic.com</span></p>
        </div>
      </div>

      <!-- SMTP (optional) -->
      <div class="p-6 space-y-4">
        <div class="flex items-center justify-between">
          <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-widest">3 · Email / SMTP</h2>
          <span class="text-xs text-slate-600">Optional — configure later in Admin</span>
        </div>
        <input name="smtp_host" type="text" placeholder="smtp.gmail.com"
          class="w-full bg-slate-900/60 border border-slate-700/50 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-[#00B5AD]/60 transition"/>
        <div class="grid grid-cols-2 gap-3">
          <input name="smtp_user" type="text" placeholder="SMTP username"
            class="bg-slate-900/60 border border-slate-700/50 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-[#00B5AD]/60 transition"/>
          <input name="smtp_password" type="password" placeholder="SMTP password"
            class="bg-slate-900/60 border border-slate-700/50 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-[#00B5AD]/60 transition"/>
        </div>
      </div>

      <div class="p-6">
        <button type="submit"
          class="w-full py-3 bg-[#00B5AD] hover:bg-[#00B5AD]/80 text-[#0D1B3E] font-bold rounded-lg text-sm transition">
          Complete Setup →
        </button>
      </div>
    </form>

    <p class="text-center text-xs text-slate-700 mt-6">© 2026 Network Logic Limited</p>
  </div>
</body>
</html>
