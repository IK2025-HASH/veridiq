{% extends "web/_base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="text-center mb-8">
    <h1 class="text-3xl font-bold text-white mb-2">Set new password</h1>
    <p class="text-slate-400 text-sm">Choose a strong password for your account</p>
  </div>
  <div class="bg-slate-800/60 border border-slate-700/50 rounded-xl p-8 space-y-5">
    <div id="error-box" class="hidden bg-red-900/30 border border-red-500/30 rounded-lg p-3 text-sm text-red-300"></div>
    <div>
      <label class="block text-xs font-medium text-slate-400 mb-1.5">New password</label>
      <input id="password" type="password" placeholder="••••••••"
        class="w-full bg-slate-900/60 border border-slate-600/50 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-[#00B5AD]/60"/>
    </div>
    <div>
      <label class="block text-xs font-medium text-slate-400 mb-1.5">Confirm password</label>
      <input id="password2" type="password" placeholder="••••••••"
        class="w-full bg-slate-900/60 border border-slate-600/50 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-[#00B5AD]/60"/>
    </div>
    <button onclick="doReset()" class="w-full py-3 bg-[#00B5AD] hover:bg-[#00B5AD]/80 text-[#0D1B3E] font-bold rounded-lg text-sm transition">Set new password →</button>
  </div>
</div>
<script>
async function doReset(){
  const pw=document.getElementById('password').value;
  const pw2=document.getElementById('password2').value;
  if(pw!==pw2){showErr('Passwords do not match.');return;}
  if(pw.length<8){showErr('Password must be at least 8 characters.');return;}
  const r=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:'{{ token }}',new_password:pw})});
  const d=await r.json();
  if(r.ok)location.href=d.redirect;
  else showErr(d.detail||'Reset failed — link may have expired');
}
function showErr(m){const e=document.getElementById('error-box');e.textContent=m;e.classList.remove('hidden');}
</script>
{% endblock %}
