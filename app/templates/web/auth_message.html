{% extends "web/_base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto text-center py-16 space-y-6">
  <div class="text-5xl">{% if 'verified' in title %}✅{% elif 'expired' in title %}⏰{% else %}ℹ️{% endif %}</div>
  <h1 class="text-2xl font-bold text-white">{{ title }}</h1>
  <p class="text-slate-400 text-sm">{{ message }}</p>
  <a href="{{ action_href }}" class="inline-block px-6 py-3 bg-[#00B5AD] hover:bg-[#00B5AD]/80 text-[#0D1B3E] font-bold rounded-lg text-sm transition">{{ action_label }}</a>
</div>
{% endblock %}
