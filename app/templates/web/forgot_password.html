{% extends "web/_base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="text-center mb-8">
    <h1 class="text-3xl font-bold text-white mb-2">Forgot your password?</h1>
    <p class="text-slate-400 text-sm">Enter your email and we'll send a reset link</p>
  </div>
  <div class="bg-slate-800/60 border border-slate-700/50 rounded-xl p-8 space-y-5">
    <div id="success-box" class="hidden bg-emerald-900/30 border border-emerald-500/30 rounded-lg p-3 text-sm text-emerald-300"></div>
    <div>
      <label class="block text-xs font-medium text-slate-400 mb-1.5">Email address</label>
      <input id="email" type="email" placeholder="you@company.com"
        class="w-full bg-slate-900/60 border border-slate-600/50 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-[#00B5AD]/60"/>
    </div>
    <button onclick="doForgot()" class="w-full py-3 bg-[#00B5AD] hover:bg-[#00B5AD]/80 text-[#0D1B3E] font-bold rounded-lg text-sm transition">Send reset link →</button>
    <p class="text-center text-xs"><a href="/login" class="text-[#00B5AD] hover:underline">← Back to sign in</a></p>
  </div>
</div>
<script>
async function doForgot(){
  const r=await fetch('/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value})});
  const d=await r.json();
  const s=document.getElementById('success-box');
  s.textContent='If an account exists for that email, a reset link has been sent. Check your inbox.';
  s.classList.remove('hidden');
}
</script>
{% endblock %}
